name: Issue Fixer Agent

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  fix-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: read
      pull-requests: write
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Check for open issues and create PRs
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Get open issues
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            console.log(`📋 Found ${issues.data.length} open issues`);

            // Filter issues that don't have PRs already linked
            let issuesWithoutPR = [];

            for (const issue of issues.data) {
              // Skip pull requests and pinned issues
              if (issue.pull_request) continue;

              // Check if issue has a linked PR by searching for PRs that mention this issue
              const prSearch = await github.rest.search.issuesAndPullRequests({
                q: `repo:${context.repo.owner}/${context.repo.repo} is:pr "#${issue.number}"`,
              });

              if (prSearch.items.length === 0) {
                issuesWithoutPR.push(issue);
              }
            }

            console.log(`🔍 Found ${issuesWithoutPR.length} issues without linked PRs`);

            // Filter priority issues (max 1 per run to avoid conflicts)
            const priorityIssues = issuesWithoutPR.filter(issue =>
              issue.labels.some(label =>
                ['documentation', 'high-priority', 'bug', 'enhancement'].includes(label.name)
              )
            ).slice(0, 1); // Limit to 1 issue per run

            console.log(`⚡ Processing ${priorityIssues.length} priority issue(s)`);

            core.setOutput('issues-to-fix', JSON.stringify(priorityIssues));
            core.setOutput('issue-count', priorityIssues.length);

      - name: Process and fix issues
        if: fromJSON(steps.check-issues.outputs.issue-count || '0') > 0
        id: fix-issues
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');
            const path = require('path');

            const issues = JSON.parse('${{ steps.check-issues.outputs.issues-to-fix }}');

            let prLinks = [];

            for (const issue of issues) {
              console.log(`\n🔧 Processing Issue #${issue.number}: ${issue.title}`);

              const branchName = `fix/issue-${issue.number}`;
              const baseBranch = 'main';

              try {
                // Create and checkout new branch
                console.log(`  Creating branch: ${branchName}`);
                execSync(`git checkout -b ${branchName}`, { cwd: process.cwd() });

                // Implement fix based on issue type
                let filesChanged = false;

                if (issue.labels.some(l => l.name === 'documentation')) {
                  console.log('  📚 Implementing documentation fix...');
                  filesChanged = await implementDocumentationFix(issue.number);
                }

                if (issue.labels.some(l => l.name === 'bug')) {
                  console.log('  🐛 Implementing bug fix...');
                  filesChanged = await implementBugFix(issue);
                }

                if (issue.labels.some(l => l.name === 'enhancement')) {
                  console.log('  ✨ Implementing enhancement...');
                  filesChanged = await implementEnhancement(issue);
                }

                // Commit changes if any files were modified
                if (filesChanged) {
                  execSync('git add -A', { cwd: process.cwd() });

                  const commitMessage = `Fixes #${issue.number}: ${issue.title}\\n\\n- Automatically generated fix by Issue Fixer Agent\\n- Issue: ${issue.html_url}`;

                  execSync(`git commit -m "${commitMessage.replace(/"/g, '\\\\"')}"`, { cwd: process.cwd() });

                  // Push branch
                  console.log(`  Pushing branch: ${branchName}`);
                  execSync(`git push origin ${branchName}`, { cwd: process.cwd() });

                  // Create Pull Request
                  console.log(`  Creating PR for issue #${issue.number}`);
                  const pr = await github.rest.pulls.create({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title: `Fixes #${issue.number}: ${issue.title}`,
                    body: \`## Description\\n\\nThis PR automatically fixes issue #${issue.number}.\\n\\n**Issue:** ${issue.title}\\n\\n## Changes\\n- Implemented fix based on issue requirements\\n- Auto-generated by Issue Fixer Agent\\n\\n## Related\\nCloses #${issue.number}\`,
                    head: branchName,
                    base: baseBranch
                  });

                  console.log(`✅ PR Created: #${pr.data.number}`);
                  prLinks.push(pr.data.html_url);

                  // Add labels to PR
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: pr.data.number,
                    labels: ['auto-generated', 'issue-fixer-agent']
                  });

                  // Add comment linking to issue
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    body: \`🤖 **Issue Fixer Agent** has created a PR to address this issue.\\n\\nPR: #${pr.data.number}\\n\\nReview the changes and merge when ready!\`
                  });

                } else {
                  console.log(`  ⚠️ No changes made for issue #${issue.number}`);
                  execSync(`git checkout ${baseBranch}`, { cwd: process.cwd() });
                  execSync(`git branch -D ${branchName}`, { cwd: process.cwd() });
                }

              } catch (error) {
                console.error(`  ❌ Error processing issue #${issue.number}:`, error.message);
                try {
                  execSync(`git checkout ${baseBranch}`, { cwd: process.cwd() });
                  execSync(`git branch -D ${branchName}`, { cwd: process.cwd(), stdio: 'pipe' });
                } catch (e) {}
              }
            }

            // Set output for summary
            core.setOutput('pr-links', prLinks.join('\\n'));

            // Helper function to implement documentation fixes
            async function implementDocumentationFix(issueNumber) {
              let changed = false;

              // Create README.md if it doesn't exist
              const readmePath = 'README.md';
              if (!fs.existsSync(readmePath)) {
                const readmeContent = \`# TestProject - Portfolio Website

