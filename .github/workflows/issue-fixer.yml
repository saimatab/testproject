      - name: Create summary comment
        if: steps.fix-issues.outputs.pr-links != ''
        uses: actions/github-script@v7
        with:
          script: |
            const prLinks = '${{ steps.fix-issues.outputs.pr-links }}'.split('\n').filter(link => link);

            if (prLinks.length > 0) {
              console.log('🎉 Pull Requests Created:');
              prLinks.forEach(link => console.log('  - ' + link));
