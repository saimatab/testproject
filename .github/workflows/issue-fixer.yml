name: Issue Fixer Agent

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  check-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: read
      pull-requests: write
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Issue Fixer Bot"

      - name: Check for open issues
        id: check-issues
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            console.log(`Found ${issues.data.length} open issues`);

            // Filter issues that don't have PRs already linked
            const issuesWithoutPR = [];

            for (const issue of issues.data) {
              // Skip pull requests
              if (issue.pull_request) continue;

              // Check if issue has a linked PR
              const linkedPRs = await github.rest.issues.listEventsForTimeline({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number
              });

              const hasPR = linkedPRs.data.some(event =>
                event.type === 'cross-referenced' && event.source?.issue?.pull_request
              );

              if (!hasPR) {
                issuesWithoutPR.push(issue);
              }
            }

            console.log(`Found ${issuesWithoutPR.length} issues without linked PRs`);

            // Log details for documentation and priority issues
            const priorityIssues = issuesWithoutPR.filter(issue =>
              issue.labels.some(label =>
                label.name === 'documentation' ||
                label.name === 'high-priority' ||
                label.name === 'bug'
              )
            ).slice(0, 2); // Limit to 2 issues per run

            core.setOutput('priority-issues-count', priorityIssues.length);
            core.setOutput('priority-issues', JSON.stringify(priorityIssues));

            return priorityIssues.length > 0;

      - name: Create PR template for issues
        if: steps.check-issues.outputs.priority-issues-count > 0
        run: |
          echo "## Issue Fixer Agent Report"
          echo ""
          echo "✅ Identified priority issues for fixing:"
          echo ""
          echo "${{ steps.check-issues.outputs.priority-issues }}" | jq -r '.[] | "- Issue #\(.number): \(.title)"'

      - name: Log issue details
        if: steps.check-issues.outputs.priority-issues-count > 0
        uses: actions/github-script@v7
        with:
          script: |
            const issues = JSON.parse('${{ steps.check-issues.outputs.priority-issues }}');

            for (const issue of issues) {
              console.log(`\n📋 Issue #${issue.number}: ${issue.title}`);
              console.log(`   Labels: ${issue.labels.map(l => l.name).join(', ')}`);
              console.log(`   Created: ${issue.created_at}`);
              console.log(`   URL: ${issue.html_url}`);
            }

      - name: Create documentation for fixing process
        if: steps.check-issues.outputs.priority-issues-count > 0
        run: |
          mkdir -p .github/issue-fixes

          # Create a file documenting what issues need to be fixed
          cat > .github/issue-fixes/pending-issues.md << 'EOF'
          # Pending Issues to Fix

          This file documents issues that need to be addressed.
          Generated by Issue Fixer Agent

          ## Next Steps

          1. Review the issues listed below
          2. Create a branch for each issue (e.g., `fix/issue-1`)
          3. Implement the fix
          4. Create a Pull Request with reference to the issue
          5. Link PR to issue in description

          EOF

          echo "${{ steps.check-issues.outputs.priority-issues }}" | jq -r '.[] | "- [ ] #\(.number): \(.title) (Labels: \(.labels | map(.name) | join(\", \")))"' >> .github/issue-fixes/pending-issues.md

      - name: Commit pending issues report
        if: steps.check-issues.outputs.priority-issues-count > 0
        run: |
          git add .github/issue-fixes/pending-issues.md
          git commit -m "docs: Update pending issues report" || echo "No changes to commit"
          git push origin HEAD:main || echo "No changes to push"
        continue-on-error: true

      - name: Summary
        uses: actions/github-script@v7
        with:
          script: |
            const issueCount = '${{ steps.check-issues.outputs.priority-issues-count }}';

            if (issueCount > 0) {
              core.notice(`🤖 Issue Fixer Agent found ${issueCount} priority issue(s) to address!`);
              core.notice(`Check the pending-issues.md report for details.`);
            } else {
              core.notice(`✅ No pending issues found. Repository is in good shape!`);
            }
