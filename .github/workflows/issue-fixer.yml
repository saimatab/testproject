      - name: Workflow Summary
        uses: actions/github-script@v7
        with:
          script: |
            const issueCount = '${{ steps.check-issues.outputs.issue-count }}';
            const prLinks = '${{ steps.fix-issues.outputs.pr-links }}';

            if (issueCount > 0 && prLinks) {
